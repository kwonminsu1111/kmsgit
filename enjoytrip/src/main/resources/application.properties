server.port=8080

# ===================================================================
# 1. DB 연결 세팅
# ===================================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/enjoytrip
spring.datasource.username=root
spring.datasource.password=1234

# ====================================================================
# 2. SQL 초기화 스크립트 자동 실행 설정
# ====================================================================
spring.sql.init.mode=never
spring.sql.init.username=root
spring.sql.init.password=1234
spring.sql.init.schema-locations=classpath:scripts/EnjoyTrip.sql
spring.sql.init.continue-on-error=true

# ====================================================================
# 3. MyBatis 내비게이션 설정
# ====================================================================
mybatis.mapper-locations=classpath:mappers/**/*.xml

# DTO/Model 클래스가 모여있는 패키지 지정
mybatis.type-aliases-package=com.ssafy.enjoytrip.model

# 🔥 [교정완료] 중복 코드를 지우고 진짜 카멜케이스 변환 옵션을 정확히 매핑했습니다!
mybatis.configuration.map-underscore-to-camel-case=true